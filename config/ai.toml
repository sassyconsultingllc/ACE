# ==============================================================================
# MCP Server Mode - Expose Browser as MCP Server
# ==============================================================================
# Run Sassy Browser as an MCP server that Claude Desktop (or other MCP clients)
# can connect to and control. This turns Sassy Browser into a browser automation
# tool that Claude can use.
#
# Usage in Claude Desktop (claude_desktop_config.json):
# {
#   "mcpServers": {
#     "sassy-browser": {
#       "command": "sassy-browser.exe",
#       "args": ["--mcp-server"]
#     }
#   }
# }

[mcp_server]
enabled = true
transport = "stdio"     # "stdio" (for Claude Desktop) or "socket"
port = 9999             # Port for socket transport
confirm_destructive = true  # Require confirmation for destructive actions

# Allowed tool categories
# - navigation: navigate, new_tab, close_tab, list_tabs
# - reading: read_page, get_text, find_element
# - interaction: click, type_text, press_key, scroll, form_input
# - screenshot: screenshot
# - javascript: execute_js
# - security: get_trust_level, get_security_info
# - files: open_file, get_file_info
allowed_tools = ["navigation", "reading", "interaction", "screenshot", "security", "files"]
# Note: "javascript" is not enabled by default for security

# ==============================================================================
# MCP Multi-Agent Coding System
# ==============================================================================
# Four AI agents working together for conversational code editing:
#   🗣️ Voice  - Intent understanding, natural conversation
#   🎯 Orchestrator - Task planning, workflow management
#   ⚡ Coder  - Code generation and editing
#   🔍 Auditor - Code review, feasibility analysis

[mcp]
enabled = true
mode = "cloud"  # "cloud", "self-hosted", "hybrid", "local"

# Default cloud providers (set API keys below)
# Cloud mode uses: Grok (xAI), Manus, Claude (Anthropic), Gemini (Google)

# ==============================================================================
# API Keys for Cloud Mode
# ==============================================================================
[mcp.keys]
xai = "xai-nz0Dty69WHeSUcK1cMroW0hNjL9FosbInOhD3qB0tTxvYH8LeuALl1qHLOuSSPBjzgjjQsJqOt3cMoym"           # https://console.x.ai - Grok
anthropic = "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"     # https://console.anthropic.com - Claude
google = "AIzaSyC4h4x6koUvbCg_qH52x9hUsXIv2sGkM2Q"        # https://aistudio.google.com - Gemini
together = ""      # https://api.together.xyz - Together.ai (alternative)
huggingface = ""   # https://huggingface.co/settings/tokens - HF Inference

# ==============================================================================
# Speech-to-Text (Whisper) - Microphone Input
# ==============================================================================
# Local Whisper transcription using whisper.cpp (GPU accelerated)
# Download models from: https://huggingface.co/ggerganov/whisper.cpp

[whisper]
enabled = true
model = "base"     # "tiny", "base", "small", "medium", "large"
use_gpu = true     # Use GPU acceleration (CUDA/Metal)
language = "en"    # Target language (empty = auto-detect)

# Voice Activity Detection
vad_threshold = 0.3        # 0.0-1.0, lower = more sensitive
silence_duration = 1.5     # Seconds of silence before auto-stop
max_duration = 60.0        # Maximum recording length in seconds
live_preview = true        # Show real-time transcription

# ==============================================================================
# Voice Agent (Intent Understanding)
# ==============================================================================
[mcp.voice]
enabled = true
provider = "xai"   # "xai", "together", "huggingface", "ollama", "openai"

# Cloud: xAI Grok
[mcp.voice.xai]
url = "https://api.x.ai/v1/chat/completions"
model = "grok-2"
max_tokens = 4096
temperature = 0.7

# Alternative: Together.ai (Llama)
[mcp.voice.together]
url = "https://api.together.xyz/v1/chat/completions"
model = "meta-llama/Llama-3.3-70B-Instruct-Turbo"
max_tokens = 4096
temperature = 0.7

# Alternative: Hugging Face Inference Endpoint
[mcp.voice.huggingface]
url = ""  # Your HF endpoint URL
model = "meta-llama/Llama-3.3-70B-Instruct"
max_tokens = 4096
temperature = 0.7

# Local: Ollama
[mcp.voice.ollama]
url = "http://localhost:11434/api/chat"
model = "llama3.3:70b"
max_tokens = 4096
temperature = 0.7

# ==============================================================================
# Orchestrator Agent (Task Planning)
# ==============================================================================
[mcp.orchestrator]
enabled = true
provider = "together"  # "together", "huggingface", "ollama", "openai"

# Cloud: Together.ai (Mixtral)
[mcp.orchestrator.together]
url = "https://api.together.xyz/v1/chat/completions"
model = "mistralai/Mixtral-8x22B-Instruct-v0.1"
