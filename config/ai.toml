temperature = 0.3

# Alternative: Hugging Face
[mcp.orchestrator.huggingface]
url = ""  # Your HF endpoint URL
model = "mistralai/Mixtral-8x22B-Instruct-v0.1"
max_tokens = 8192
temperature = 0.3

# Local: Ollama
[mcp.orchestrator.ollama]
url = "http://localhost:11434/api/chat"
model = "mixtral:8x22b"
max_tokens = 8192
temperature = 0.3

# ==============================================================================
# Coder Agent (Code Generation)
# ==============================================================================
[mcp.coder]
enabled = true
provider = "anthropic"  # "anthropic", "together", "huggingface", "ollama"

# Cloud: Anthropic Claude
[mcp.coder.anthropic]
url = "https://api.anthropic.com/v1/messages"
model = "claude-sonnet-4-20250514"
max_tokens = 8192
temperature = 0.3

# Alternative: Together.ai (Qwen Coder)
[mcp.coder.together]
url = "https://api.together.xyz/v1/chat/completions"
model = "Qwen/Qwen2.5-Coder-32B-Instruct"
max_tokens = 8192
temperature = 0.3

# Alternative: Hugging Face
[mcp.coder.huggingface]
url = ""  # Your HF endpoint URL
model = "Qwen/Qwen2.5-Coder-32B-Instruct"
max_tokens = 8192
temperature = 0.3

# Local: Ollama
[mcp.coder.ollama]
url = "http://localhost:11434/api/chat"
model = "qwen2.5-coder:32b"
max_tokens = 8192
temperature = 0.3

# ==============================================================================
# Auditor Agent (Code Review)
# ==============================================================================
[mcp.auditor]
enabled = true
