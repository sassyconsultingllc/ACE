# Sassy Browser Theme Configuration
# All colors in hex format, positions in pixels or percentages

[meta]
name = "Sassy Dark"
version = "1.0"
author = "SassyBrowser"

[colors]
# Base colors
background = "#0d1117"
surface = "#161b22"
surface_elevated = "#21262d"
border = "#30363d"

# Text colors
text_primary = "#e6edf3"
text_secondary = "#8b949e"
text_muted = "#6e7681"

# Accent colors
accent = "#58a6ff"
accent_hover = "#79c0ff"
accent_active = "#388bfd"

# Status colors
success = "#3fb950"
warning = "#d29922"
error = "#f85149"
info = "#58a6ff"

# Tab colors
tab_active = "#21262d"
tab_inactive = "#0d1117"
tab_hover = "#161b22"

# Sidebar colors
sidebar_bg = "#0d1117"
sidebar_border = "#21262d"

[typography]
font_family = "Inter, system-ui, sans-serif"
font_mono = "JetBrains Mono, monospace"
font_size_xs = 11
font_size_sm = 13
font_size_base = 14
font_size_lg = 16
font_size_xl = 20
font_size_2xl = 24
line_height = 1.5

[spacing]
xs = 4
sm = 8
md = 16
lg = 24
xl = 32
xxl = 48

[borders]
radius_sm = 4
radius_md = 8
radius_lg = 12
radius_full = 9999
width = 1

[shadows]
sm = "0 1px 2px rgba(0,0,0,0.3)"
md = "0 4px 6px rgba(0,0,0,0.4)"
lg = "0 10px 15px rgba(0,0,0,0.5)"

[layout]
# Sidebar configuration (top, right, bottom, left)
# Each can be: "hidden", "collapsed", "expanded"
sidebar_top = "expanded"
sidebar_right = "collapsed"
sidebar_bottom = "hidden"
sidebar_left = "expanded"

# Sidebar sizes (pixels)
sidebar_top_height = 48
sidebar_bottom_height = 32
sidebar_left_width = 280
sidebar_right_width = 320

# Collapsed sizes
sidebar_collapsed_size = 48

# Tab tile grid
tab_tile_min_width = 200
tab_tile_max_width = 300
tab_tile_aspect_ratio = 0.75
tab_tile_gap = 12

[animations]
# Duration in milliseconds
duration_fast = 150
duration_normal = 250
duration_slow = 400
easing = "ease-out"

[phone_sync]
enabled = true
port = 8765
auto_connect = true
show_qr = true

[panels]
# Which panels are visible by default
address_bar = true
navigation_buttons = true
tab_bar = true
bookmarks_bar = false
status_bar = true
dev_tools = false

[tab_tiles]
# Tile view settings
columns_auto = true
columns_min = 2
columns_max = 6
show_favicon = true
show_title = true
show_url = false
show_preview = true
preview_quality = "medium"  # low, medium, high
