# Sassy Browser API - GraphQL Schema Demo

type Query {
  user(id: ID!): User
  files(userId: ID!, limit: Int = 10): [File!]!
  searchFiles(query: String!): [File!]!
}

type Mutation {
  createUser(input: CreateUserInput!): User!
  uploadFile(input: UploadFileInput!): File!
  deleteFile(id: ID!): Boolean!
}

type User {
  id: ID!
  email: String!
  username: String!
  subscription: SubscriptionTier!
  files: [File!]!
  createdAt: DateTime!
}

type File {
  id: ID!
  name: String!
  path: String!
  mimeType: String!
  size: Int!
  category: FileCategory!
  uploadedAt: DateTime!
}

enum SubscriptionTier {
  FREE
  PRO
  ENTERPRISE
}

enum FileCategory {
  DOCUMENT
  IMAGE
  SCIENTIFIC
  CODE
  DATA
}

input CreateUserInput {
  email: String!
  username: String!
  password: String!
}

input UploadFileInput {
  name: String!
  content: String!
  mimeType: String!
}

scalar DateTime
