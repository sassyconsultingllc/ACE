# Sassy Browser Configuration
# YAML format demo

application:
  name: "Sassy Browser"
  version: "2.0.0"
  codename: "Pure Rust Edition"

security:
  sandbox_layers: 4
  telemetry: false
  google_dependencies: 0
  
features:
  file_formats:
    - documents: [pdf, docx, xlsx, pptx, odt, ods]
    - images: [png, jpg, webp, svg, gif, bmp, tiff]
    - scientific: [pdb, mol, fasta, sdf, cif]
    - code: [rs, py, js, ts, html, css, json]
  
  devtools:
    rest_client: true
    network_inspector: true
    code_editor: true
    
deployment:
  platforms:
    - windows
    - macos  
    - linux
  architecture: [x86_64, aarch64]
